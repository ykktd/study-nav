name: Supabase Keep Alive

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call keep-alive endpoint
        run: |
          curl --fail --silent --show-error \
            --header "x-keep-alive-secret: $KEEP_ALIVE_SECRET" \
            "$KEEP_ALIVE_URL"
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL }}
          KEEP_ALIVE_SECRET: ${{ secrets.KEEP_ALIVE_SECRET }}
